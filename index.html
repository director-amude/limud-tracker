<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>לוח לימוד</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0f0f1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="לוח לימוד"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f1a;
  --surface:#1a1a2e;
  --surface2:#22223b;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);
  --text:#f1f0ff;
  --muted:#8b8aab;
  --faint:#4a4968;

  --blue:#7c6eff;
  --blue2:#a89bff;
  --green:#22d3a5;
  --amber:#f5b942;
  --rose:#f4637a;
  --teal:#38bdf8;

  --g-tanach:linear-gradient(135deg,#22d3a5,#0ea5e9);
  --g-mishnah:linear-gradient(135deg,#38bdf8,#6366f1);
  --g-gemara:linear-gradient(135deg,#f5b942,#f4637a);
  --g-shulchan:linear-gradient(135deg,#c084fc,#f4637a);
  --g-hero:linear-gradient(160deg,#1a1a3e 0%,#0f0f1a 60%);

  --r:16px;
  --ind:env(safe-area-inset-bottom,0px);
  --font:'Inter',sans-serif;
  --font-he:'Frank Ruhl Libre','Inter',sans-serif;
}
html[lang=he]{direction:rtl}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(72px + var(--ind));overflow-x:hidden}
html[lang=he] body{font-family:var(--font-he)}

/* ── TOPBAR ── */
.topbar{background:rgba(15,15,26,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.topbar-in{max-width:480px;margin:0 auto;display:flex;align-items:center;height:56px;padding:0 18px;gap:12px}
.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#7c6eff,#a89bff);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;box-shadow:0 0 16px rgba(124,110,255,.4)}
.app-name{font-weight:800;font-size:16px;background:linear-gradient(90deg,#a89bff,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lang-btn{margin-left:auto;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:6px 13px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:5px;transition:.15s}
.lang-btn:active{transform:scale(.94)}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,26,.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:50;display:flex;padding-bottom:var(--ind)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px;border:none;background:none;cursor:pointer;font-family:inherit;gap:3px;transition:.2s}
.nb-icon{font-size:20px;line-height:1;transition:.2s}
.nb-lbl{font-size:10px;font-weight:700;color:var(--faint);letter-spacing:.2px;transition:.2s}
.nb.on .nb-lbl{color:var(--blue2)}
.nb.on .nb-icon{filter:drop-shadow(0 0 6px rgba(168,155,255,.7))}
.nb-bar{width:20px;height:2px;border-radius:99px;background:var(--blue);opacity:0;margin-top:2px;transition:.2s}
.nb.on .nb-bar{opacity:1}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(76px + var(--ind));right:18px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#7c6eff,#a89bff);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 4px 20px rgba(124,110,255,.5);z-index:40;transition:.2s}
.fab:active{transform:scale(.88)}

/* ── MAIN ── */
#app{max-width:480px;margin:0 auto;padding:18px 16px 0}
.view{}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px}
.card-flush{padding:0;overflow:hidden}
.glass{background:rgba(255,255,255,.04);backdrop-filter:blur(10px);border:1px solid var(--border2)}

/* ── SECTION GRADIENT CARDS ── */
.sec-card{border-radius:20px;padding:18px;cursor:pointer;position:relative;overflow:hidden;transition:.2s;border:none}
.sec-card:active{transform:scale(.96)}
.sec-card::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.15)}
.sec-card-content{position:relative;z-index:1}

/* ── PROGRESS RING ── */
.ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-pct{position:absolute;font-weight:900;font-size:13px;color:var(--text);text-align:center;line-height:1}
.ring-pct span{display:block;font-size:9px;font-weight:600;color:var(--muted);margin-top:1px}

/* ── PROGRESS BAR ── */
.pbar{height:6px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.pfill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── MASECHET BLOCKS ── */
.mblock{border-bottom:1px solid var(--border)}
.mblock:last-child{border-bottom:none}
.mheader{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;transition:.15s;user-select:none}
.mheader:active{background:rgba(255,255,255,.03)}
.mtitle{font-weight:700;font-size:15px;color:var(--text)}
.mstats{font-size:11px;color:var(--muted);margin-top:2px}
.marrow{color:var(--faint);font-size:11px;transition:.2s}
.marrow.open{transform:rotate(180deg)}

/* ── UNIT BUTTONS ── */
.units-wrap{padding:10px 14px 16px;display:flex;flex-wrap:wrap;gap:5px}
.ubt{height:36px;min-width:44px;padding:0 6px;border-radius:9px;border:1.5px solid var(--border2);background:var(--surface2);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:.15s;gap:1px}
.ubt:active{transform:scale(.88)}
.ubt.s1{background:linear-gradient(135deg,rgba(124,110,255,.3),rgba(99,102,241,.2));border-color:rgba(124,110,255,.6);color:#a89bff}
.ubt.s2{background:linear-gradient(135deg,rgba(34,211,165,.25),rgba(14,165,233,.2));border-color:rgba(34,211,165,.5);color:#22d3a5}
.ubt.s3{background:linear-gradient(135deg,rgba(245,185,66,.25),rgba(244,99,122,.2));border-color:rgba(245,185,66,.5);color:#f5b942}

/* ── SEDER HEADER ── */
.seder-lbl{padding:8px 16px;font-size:10px;font-weight:800;color:var(--faint);letter-spacing:1px;text-transform:uppercase;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border)}

/* ── PEREK sub-blocks (Mishnah) ── */
.perek-row{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.perek-lbl{font-size:10px;font-weight:700;color:var(--faint);margin-bottom:5px;letter-spacing:.3px}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700}

/* ── BUTTONS ── */
.btn{border:none;border-radius:11px;padding:11px 20px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.btn:active{transform:scale(.94)}
.btn-purple{background:linear-gradient(135deg,#7c6eff,#a89bff);color:#fff;box-shadow:0 4px 14px rgba(124,110,255,.35)}
.btn-surface{background:var(--surface2);border:1px solid var(--border2);color:var(--text)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:9px}
.btn-full{width:100%;justify-content:center}

/* ── FORMS ── */
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--border2);border-radius:11px;font-family:inherit;font-size:14px;outline:none;background:var(--surface2);color:var(--text);transition:.15s}
.inp:focus{border-color:var(--blue);background:rgba(124,110,255,.08)}
.sel{width:100%;padding:12px 14px;border:1.5px solid var(--border2);border-radius:11px;font-family:inherit;font-size:14px;outline:none;background:var(--surface2);color:var(--text);appearance:none}
.sel:focus{border-color:var(--blue)}
.lbl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.4px;display:block;margin-bottom:6px;text-transform:uppercase}
textarea.inp{min-height:70px;resize:none}
.field{margin-bottom:14px}

/* ── TYPE OPTIONS ── */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.type-opt{border:1.5px solid var(--border2);border-radius:11px;padding:10px 6px;cursor:pointer;font-weight:700;font-size:12px;text-align:center;background:var(--surface2);font-family:inherit;display:block;width:100%;color:var(--muted);transition:.15s}
.type-opt input{display:none}

/* ── CHAZ INTERVAL ── */
.iv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.iv-opt{border:1.5px solid var(--border2);border-radius:11px;padding:10px 6px;cursor:pointer;font-weight:700;font-size:11px;text-align:center;background:var(--surface2);font-family:inherit;display:block;width:100%;color:var(--muted);transition:.15s}
.iv-opt input{display:none}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(6px)}
.mbox{background:#16162a;border:1px solid var(--border2);border-radius:24px 24px 0 0;padding:22px 18px;width:100%;max-height:93vh;overflow-y:auto;padding-bottom:calc(22px + var(--ind))}
.mhandle{width:36px;height:4px;border-radius:99px;background:var(--border2);margin:0 auto 18px}
.mbox h3{font-weight:800;font-size:18px;margin-bottom:16px;color:var(--text)}

/* ── CTX MENU ── */
.ctx{position:fixed;background:#1e1e38;border:1px solid var(--border2);border-radius:14px;z-index:500;overflow:hidden;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.ctx-item{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;color:var(--text);transition:.1s}
.ctx-item:last-child{border:none}
.ctx-item:active{background:rgba(255,255,255,.06)}

/* ── GOAL / CHAZ CARDS ── */
.goal-card{border-radius:14px;padding:15px;margin-bottom:10px;border:1px solid var(--border);background:var(--surface);border-left:3px solid transparent}
.chaz-card{border-radius:14px;padding:15px;margin-bottom:10px;border:1px solid var(--border);background:var(--surface);border-left:3px solid var(--blue)}

/* ── LOG ROWS ── */
.log-row{display:flex;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);align-items:flex-start}
.log-row:last-child{border-bottom:none}
.sec-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center}
.stat-num{font-size:26px;font-weight:900;line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;margin-top:3px}

/* ── ALERTS ── */
.alert{border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}

/* ── MISC ── */
.empty{text-align:center;padding:36px 16px;color:var(--faint);font-size:14px;line-height:1.7}
.section-lbl{font-size:11px;font-weight:800;color:var(--faint);letter-spacing:.8px;text-transform:uppercase;margin:18px 0 8px}
.divider{height:1px;background:var(--border);margin:8px 0}
.dayb{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface2);font-size:10px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--muted);transition:.15s}
.dayb.on{background:var(--blue);border-color:var(--blue);color:#fff}
input[type=range]{accent-color:var(--blue);width:100%}
input[type=checkbox]{accent-color:var(--blue);width:16px;height:16px;cursor:pointer}
.legend{display:flex;gap:12px;align-items:center;font-size:11px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap}
.ldot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── INSTALL BANNER ── */
.install-banner{border-radius:16px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(124,110,255,.25),rgba(56,189,248,.15));border:1px solid rgba(124,110,255,.3)}
.install-banner button{background:rgba(124,110,255,.4);border:1px solid rgba(168,155,255,.4);color:#fff;border-radius:9px;padding:7px 14px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer}

/* ── TOAST ── */
@keyframes tpop{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast-box{position:fixed;bottom:calc(82px + var(--ind));left:50%;transform:translateX(-50%);z-index:300;padding:10px 22px;border-radius:12px;font-weight:700;font-size:13px;white-space:nowrap;pointer-events:none;animation:tpop .22s ease;border:1px solid rgba(255,255,255,.1)}

/* ── ANIMATIONS ── */
@keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fadeup{animation:fadeup .25s ease forwards}

/* ── HERO PROGRESS (Home) ── */
.hero{background:var(--g-hero);border-radius:20px;padding:22px 18px;margin-bottom:14px;position:relative;overflow:hidden;border:1px solid var(--border2)}
.hero::after{content:'';position:absolute;top:-60px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(124,110,255,.2) 0%,transparent 70%);pointer-events:none}
.hero-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:4px}
.hero-sub{font-size:11px;color:var(--faint)}

/* ── SECTION PROGRESS BARS (Home) ── */
.sec-prog{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.sp-row{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s}
.sp-row:active{transform:scale(.98)}
.sp-emoji{font-size:26px;flex-shrink:0}
.sp-info{flex:1;min-width:0}
.sp-name{font-weight:800;font-size:15px;color:var(--text)}
.sp-detail{font-size:11px;color:var(--muted);margin-top:2px}
.sp-right{text-align:right;flex-shrink:0}
.sp-pct{font-size:20px;font-weight:900}
.sp-done{font-size:10px;color:var(--muted);margin-top:1px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-in">
    <div class="logo">📚</div>
    <div class="app-name">לוח לימוד</div>
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">🌐 עברית</button>
  </div>
</div>

<!-- VIEWS -->
<div id="app">
  <div id="view-home"  class="view fadeup"></div>
  <div id="view-study" class="view" style="display:none"></div>
  <div id="view-goals" class="view" style="display:none"></div>
  <div id="view-chaz"  class="view" style="display:none"></div>
  <div id="view-logs"  class="view" style="display:none"></div>
</div>

<!-- FAB -->
<button class="fab" id="fab">＋</button>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="nb on" data-tab="home"><span class="nb-icon">🏠</span><span class="nb-lbl">Inicio</span><span class="nb-bar"></span></button>
  <button class="nb" data-tab="study"><span class="nb-icon">📚</span><span class="nb-lbl">Estudio</span><span class="nb-bar"></span></button>
  <button class="nb" data-tab="goals"><span class="nb-icon">🎯</span><span class="nb-lbl">Metas</span><span class="nb-bar"></span></button>
  <button class="nb" data-tab="chaz"><span class="nb-icon">🧠</span><span class="nb-lbl">Jazarot</span><span class="nb-bar"></span></button>
  <button class="nb" data-tab="logs"><span class="nb-icon">📋</span><span class="nb-lbl">Log</span><span class="nb-bar"></span></button>
</nav>

<div id="modal-root"></div>
<div id="ctx-root"></div>
<div id="toast-root"></div>

<script src="data.js"></script>
<script>
/* ═══ STATE ══════════════════════════════════════════════════════ */
let lang = localStorage.getItem("tt4_lang")||"es";
const gs=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

let progress  = gs("tt4_progress",{tanach:{},mishnah:{},gemara:{},shulchan:{}});
let logs      = gs("tt4_logs",[]);
let goals     = gs("tt4_goals",[]);
let chazGoals = gs("tt4_chaz",[]);
["tanach","mishnah","gemara","shulchan"].forEach(s=>{if(!progress[s])progress[s]={};});

const save=()=>{ss("tt4_progress",progress);ss("tt4_logs",logs);ss("tt4_goals",goals);ss("tt4_chaz",chazGoals);};

let currentTab="home";
let _studySec="gemara";

/* ═══ HELPERS ════════════════════════════════════════════════════ */
const t=(k)=>T[lang]?.[k]||T.es?.[k]||k;
const today=()=>new Date().toISOString().split("T")[0];
const addDays=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split("T")[0];};
const daysLeft=(d)=>Math.ceil((new Date(d)-new Date(today()))/86400000);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const L=(o)=>o?.[lang==="he"?"he":"es"]||o?.es||"";

const SEC_GRAD={tanach:"var(--g-tanach)",mishnah:"var(--g-mishnah)",gemara:"var(--g-gemara)",shulchan:"var(--g-shulchan)"};
const SEC_COLOR={tanach:"#22d3a5",mishnah:"#38bdf8",gemara:"#f5b942",shulchan:"#c084fc"};

/* ═══ LANGUAGE ═══════════════════════════════════════════════════ */
function toggleLang(){
  lang=lang==="es"?"he":"es";
  localStorage.setItem("tt4_lang",lang);
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==="he"?"rtl":"ltr";
  document.getElementById("lang-btn").textContent=lang==="es"?"🌐 עברית":"🌐 Español";
  renderAll();
}
function renderAll(){
  const fns={home:renderHome,study:renderStudy,goals:renderGoals,chaz:renderChaz,logs:renderLogs};
  if(fns[currentTab]) fns[currentTab]();
  const labels={home:[t("home"),"🏠"],study:[lang==="he"?"לימוד":"Estudio","📚"],goals:[t("goals"),"🎯"],chaz:[t("chaz"),"🧠"],logs:["Log","📋"]};
  document.querySelectorAll(".nb").forEach(b=>{
    const tab=b.dataset.tab;
    b.querySelector(".nb-lbl").textContent=labels[tab]?.[0]||tab;
  });
}

/* ═══ TOAST ══════════════════════════════════════════════════════ */
let _tt;
function toast(msg,ok=true){
  clearTimeout(_tt);
  const el=document.getElementById("toast-root");
  el.innerHTML=`<div class="toast-box" style="background:${ok?"rgba(124,110,255,.95)":"rgba(244,99,122,.95)"}">${msg}</div>`;
  _tt=setTimeout(()=>el.innerHTML="",2200);
}

/* ═══ MODAL / CTX ════════════════════════════════════════════════ */
function openModal(html){
  const root=document.getElementById("modal-root");
  root.innerHTML=`<div class="overlay" id="ov"><div class="mbox"><div class="mhandle"></div>${html}</div></div>`;
  document.getElementById("ov").addEventListener("click",e=>{if(e.target.id==="ov")closeModal();});
}
function closeModal(){document.getElementById("modal-root").innerHTML="";}

function showCtx(e,items){
  document.getElementById("ctx-root").innerHTML="";
  const m=document.createElement("div");
  m.className="ctx";
  const x=Math.min(e.clientX,window.innerWidth-180);
  const y=Math.min(e.clientY-10,window.innerHeight-items.length*46-10);
  m.style.cssText=`top:${y}px;left:${x}px`;
  items.forEach(it=>{
    const d=document.createElement("div");
    d.className="ctx-item";
    d.innerHTML=it.label;
    d.onclick=()=>{document.getElementById("ctx-root").innerHTML="";it.fn();};
    m.appendChild(d);
  });
  document.getElementById("ctx-root").appendChild(m);
  setTimeout(()=>document.addEventListener("click",()=>document.getElementById("ctx-root").innerHTML="",{once:true}),60);
}

/* ═══ PROGRESS ═══════════════════════════════════════════════════ */
const getP=(sec,bk,uid)=>progress[sec]?.[bk]?.[uid]||null;
function setP(sec,bk,unitId,val){
  if(!progress[sec])progress[sec]={};
  if(!progress[sec][bk])progress[sec][bk]={};
  if(val===null)delete progress[sec][bk][unitId];
  else progress[sec][bk][unitId]=val;
  save();
}
const countDone=(sec,bk)=>Object.keys(progress[sec]?.[bk]||{}).length;
function totalDoneSec(sec){let n=0;Object.values(progress[sec]||{}).forEach(b=>n+=Object.keys(b).length);return n;}

function secTotal(sec){
  let n=0;
  if(sec==="gemara") for(const s of Object.values(SHAS)) for(const m of s.masechtot) n+=m.dafim*2;
  else if(sec==="mishnah") for(const s of Object.values(MISHNAH)) for(const m of s.masechtot) n+=m.perakim.reduce((a,b)=>a+b,0);
  else if(sec==="tanach") for(const s of Object.values(TANACH)) for(const b of s.books) n+=b.perakim;
  else if(sec==="shulchan") SHULCHAN.forEach(c=>n+=c.simanim);
  return n;
}

/* ── TOGGLE BLOCK ── */
function toggleB(id,arrId){
  const el=document.getElementById(id);if(!el)return;

  if(arr)arr.classList.toggle("open",open);
}

/* ── CYCLE UNIT ── */
function cycleU(e,sec,bk,unitId){
  e.preventDefault();
  const cur=getP(sec,bk,unitId);
  const next=cur===null?"study":cur==="study"?"review":cur==="review"?"chazer":null;
  setP(sec,bk,unitId,next);
  if(next) addPLog(sec,bk,unitId,next);
  const btn=e.target.closest("button")||e.target;
  btn.className=`ubt ${next==="study"?"s1":next==="review"?"s2":next==="chazer"?"s3":""}`;
  updateMStats(sec,bk);
  const icons={study:"📖",review:"🔄",chazer:"🧠",null:"⬜"};
  const labels={study:t("study"),review:t("review"),chazer:t("chazer"),null:t("unmark")};
  toast(`${icons[next]||"⬜"} ${labels[next]||t("unmark")}`);
}

/* ── CTX MENU ── */
function ctxU(e,sec,bk,unitId){
  e.preventDefault();
  showCtx(e,[
    {label:`📖 ${t("study")}`,fn:()=>doSetU(sec,bk,unitId,"study")},
    {label:`🔄 ${t("review")}`,fn:()=>doSetU(sec,bk,unitId,"review")},
    {label:`🧠 ${t("chazer")}`,fn:()=>doSetU(sec,bk,unitId,"chazer")},
    {label:`⬜ ${t("unmark")}`,fn:()=>doSetU(sec,bk,unitId,null)},
  ]);
}
function doSetU(sec,bk,unitId,val){
  setP(sec,bk,unitId,val);
  if(val) addPLog(sec,bk,unitId,val);
  // refresh button
  const prefixes=["g-","tb-","mb-","sc-"];
  prefixes.forEach(pf=>{
    const el=document.getElementById(pf+bk+"-"+unitId);
    if(el) el.className=`ubt ${val==="study"?"s1":val==="review"?"s2":val==="chazer"?"s3":""}`;
  });
  updateMStats(sec,bk);
}

function updateMStats(sec,bk){
  const total=secTotalForBook(sec,bk);
  const done=countDone(sec,bk);
  const pct=total?Math.round(done/total*100):0;
  // update stats text in any open header
  ["gb-","mb-","tb-","sc-"].forEach(pf=>{
    const block=document.getElementById(pf+bk);
    if(block){
      const hdr=block.previousElementSibling;
      if(hdr){
        const st=hdr.querySelector(".mstats");
        if(st) st.textContent=`${done}/${total} · ${pct}%`;
        const fill=hdr.querySelector(".pfill");
        if(fill) fill.style.width=pct+"%";
      }
    }
  });
}

function secTotalForBook(sec,bk){
  if(sec==="gemara"){for(const s of Object.values(SHAS))for(const m of s.masechtot)if(m.id===bk)return m.dafim*2;}
  if(sec==="mishnah"){for(const s of Object.values(MISHNAH))for(const m of s.masechtot)if(m.id===bk)return m.perakim.reduce((a,b)=>a+b,0);}
  if(sec==="tanach"){for(const s of Object.values(TANACH))for(const b of s.books)if(b.id===bk)return b.perakim;}
  if(sec==="shulchan"){const ch=SHULCHAN.find(c=>c.id===bk);if(ch)return ch.simanim;}
  return 0;
}

function addPLog(sec,bk,unitId,type){
  let bookName="",unitLabel="";
  if(sec==="gemara"){for(const s of Object.values(SHAS))for(const m of s.masechtot)if(m.id===bk){bookName=L(m);break;}unitLabel=`${t("daf")} ${unitId}`;}
  else if(sec==="mishnah"){for(const s of Object.values(MISHNAH))for(const m of s.masechtot)if(m.id===bk){bookName=L(m);break;}unitLabel=unitId.replace("p",`${t("perek")} `).replace("m",` ${t("mishna")} `);}
  else if(sec==="tanach"){for(const s of Object.values(TANACH))for(const b of s.books)if(b.id===bk){bookName=L(b);break;}unitLabel=`${t("perek")} ${unitId.replace("p","")}`;}
  else if(sec==="shulchan"){const ch=SHULCHAN.find(c=>c.id===bk);if(ch)bookName=L(ch);unitLabel=`${t("siman")} ${unitId.replace("s","")}`;}
  logs=[{id:uid(),date:today(),section:sec,bookId:bk,bookName,unitLabel,type,notes:"",ts:new Date().toISOString()},...logs.slice(0,999)];
  save();
}

            </div>
            <div class="pbar"><div class="pfill" style="width:${g.progress}%;background:${SEC_GRAD[g.section]}"></div></div>
            <input type="range" min=0 max=100 step=5 value="${g.progress}" oninput="updateGoalProg('${g.id}',this.value)" style="margin-top:6px"/>
          `:""}
        </div>
        <button onclick="deleteGoal('${g.id}')" style="background:none;border:none;cursor:pointer;color:var(--faint);font-size:20px;flex-shrink:0;padding:0 2px">×</button>
      </div>
    </div>`;
  });
  document.getElementById("view-goals").innerHTML=`
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-purple" onclick="openGoalModal()">＋ ${lang==="he"?"יעד":"Meta"}</button>
    </div>${html}`;
}
function toggleGoal(id){goals=goals.map(g=>g.id===id?{...g,done:!g.done}:g);save();renderGoals();}
function updateGoalProg(id,v){goals=goals.map(g=>g.id===id?{...g,progress:+v}:g);save();}
function deleteGoal(id){goals=goals.filter(g=>g.id!==id);save();renderGoals();}

/* ═══ CHAZ ════════════════════════════════════════════════════════ */
function renderChaz(){
  const dueList=chazGoals.filter(c=>!c.done&&c.nextDate<=today());
  let banner="";
  if(dueList.length){
    let rows="";
    dueList.forEach(c=>{
      const sm=SECTIONS_META[c.section];
      rows+=`<div style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border-radius:11px;padding:10px 12px;margin-top:8px">
        <span style="font-size:20px">${sm?.emoji}</span>
        <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">${c.desc||c.material}</div><div style="font-size:11px;color:var(--muted)">${c.material}</div></div>
        <div style="text-align:center;margin-right:4px"><div style="font-size:9px;color:var(--faint)">${t("streakLabel")}</div><div style="font-weight:900;font-size:18px;color:var(--amber)">🔥${c.streak}</div></div>
        <button class="btn btn-purple btn-sm" onclick="markChaz('${c.id}')">${lang==="he"?"✓ עשיתי":"✓ Hice"}</button>
      </div>`;
    });
    banner=`<div style="background:rgba(245,185,66,.1);border:1px solid rgba(245,185,66,.3);border-radius:14px;padding:14px;margin-bottom:12px">
      <div style="font-weight:800;font-size:13px;color:var(--amber)">🔥 ${t("dueTodayAlert")}</div>${rows}</div>`;
  }

  let cards="";
  chazGoals.filter(c=>!c.done).forEach(c=>{
    const sm=SECTIONS_META[c.section];
    const dl=daysLeft(c.nextDate);const isdue=dl<=0;
    const iv=CHAZ_INTERVALS.find(i=>i.id===c.interval)||{};
    cards+=`<div class="chaz-card" style="border-left-color:${SEC_COLOR[c.section]}">
      <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px">
        <div class="sec-ico" style="background:${SEC_GRAD[c.section]}22;width:38px;height:38px;border-radius:11px">${sm?.emoji}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:14px">${c.desc||c.material}</div>
          <div style="font-size:12px;color:var(--muted)">${c.material}</div>
        </div>
        <button onclick="deleteChaz('${c.id}')" style="background:none;border:none;cursor:pointer;color:var(--faint);font-size:18px">×</button>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">
        <span class="pill" style="background:${SEC_COLOR[c.section]}22;color:${SEC_COLOR[c.section]}">${L(sm)}</span>
        <span class="pill" style="background:rgba(34,211,165,.12);color:#22d3a5">${iv.icon||""} ${t(c.interval)||""}</span>
        <span class="pill" style="background:${isdue?"rgba(245,185,66,.15)":"rgba(56,189,248,.1)"};color:${isdue?"var(--amber)":"var(--teal)"}">
          ${isdue?"⚠️ "+t("dueToday"):`📅 ${lang==="he"?"בעוד "+dl+"י":"En "+dl+"d"}`}
        </span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:20px">🔥</span>
          <div><div style="font-weight:900;font-size:22px;color:var(--amber);line-height:1">${c.streak}</div><div style="font-size:9px;color:var(--faint)">${t("streakLabel")}</div></div>
        </div>
        <button class="btn btn-sm" style="background:${isdue?"linear-gradient(135deg,#7c6eff,#a89bff)":"var(--surface2)"};color:${isdue?"#fff":"var(--muted)"};border:${isdue?"none":"1px solid var(--border2)"};box-shadow:${isdue?"0 3px 12px rgba(124,110,255,.35)":"none"}" onclick="markChaz('${c.id}')">${isdue?t("markDone"):t("markToday")}</button>
      </div>
    </div>`;
  });
  if(!chazGoals.filter(c=>!c.done).length) cards=`<div class="card"><div class="empty">${t("noChaz")}</div></div>`;

  document.getElementById("view-chaz").innerHTML=`
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-purple" onclick="openChazModal()">＋ ${lang==="he"?"חזרה":"Jazará"}</button>
    </div>
    ${banner}${cards}`;
}
function markChaz(id){
  chazGoals=chazGoals.map(c=>c.id!==id?c:{...c,streak:c.streak+1,nextDate:addDays(today(),c.days),history:[...(c.history||[]),today()]});
  save();renderChaz();renderHome();toast("🧠 +1 🔥");
}
function deleteChaz(id){chazGoals=chazGoals.filter(c=>c.id!==id);save();renderChaz();}

/* ═══ MODALS ══════════════════════════════════════════════════════ */
function openLogModal(){
  const secOpts=Object.entries(SECTIONS_META).map(([k,sm])=>`<option value="${k}">${sm.emoji} ${L(sm)}</option>`).join("");
  openModal(`
    <h3>📖 ${t("registerSession")}</h3>
    <div class="field"><label class="lbl">${t("date")}</label><input class="inp" type="date" id="lf-date" value="${today()}"/></div>
    <div class="field"><label class="lbl">${t("section")}</label><select class="sel" id="lf-sec" onchange="updLBook()">${secOpts}</select></div>
    <div class="field"><label class="lbl">${t("book")}</label><select class="sel" id="lf-book" onchange="updLUnit()"></select></div>
    <div class="field"><label class="lbl" id="lf-ulbl">${t("unit")}</label><select class="sel" id="lf-unit"></select></div>
    <div class="field"><label class="lbl">${t("type")}</label>
      <div class="type-grid">
        ${STUDY_TYPES.map((tp,i)=>`<label class="type-opt" id="lto-${tp.id}" style="${i===0?"border-color:var(--blue);background:rgba(124,110,255,.15);color:var(--blue2)":""}">
          <input type="radio" name="lf-tp" value="${tp.id}" ${i===0?"checked":""} onchange="hlType()"/>
          ${tp.icon}<br>${L(tp)}</label>`).join("")}
      </div>
    </div>
    <div class="field"><label class="lbl">${t("notes")}</label><textarea class="inp" id="lf-notes" placeholder="${t("notesPlaceholder")}"></textarea></div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-surface" onclick="closeModal()">${t("cancel")}</button>
      <button class="btn btn-purple" onclick="saveManualLog()">${t("save")}</button>
    </div>`);
  updLBook();
}
function updLBook(){
  const sec=document.getElementById("lf-sec").value;
  const bk=document.getElementById("lf-book");
  bk.innerHTML="";
  if(sec==="gemara") for(const s of Object.values(SHAS)) for(const m of s.masechtot) bk.innerHTML+=`<option value="${m.id}">${L(m)}</option>`;
  else if(sec==="mishnah") for(const s of Object.values(MISHNAH)) for(const m of s.masechtot) bk.innerHTML+=`<option value="${m.id}">${L(m)}</option>`;
  else if(sec==="tanach") for(const s of Object.values(TANACH)) for(const b of s.books) bk.innerHTML+=`<option value="${b.id}">${L(b)}</option>`;
  else if(sec==="shulchan") SHULCHAN.forEach(ch=>bk.innerHTML+=`<option value="${ch.id}">${L(ch)}</option>`);
  updLUnit();
}
function updLUnit(){
  const sec=document.getElementById("lf-sec").value;
  const bkId=document.getElementById("lf-book").value;
  const us=document.getElementById("lf-unit");
  const ul=document.getElementById("lf-ulbl");
  us.innerHTML="";
  if(sec==="gemara"){
    ul.textContent=t("daf")+" / "+t("amud");
    let m;for(const s of Object.values(SHAS))for(const mx of s.masechtot)if(mx.id===bkId)m=mx;
    if(m)for(let d=2;d<=m.dafim+1;d++)["א","ב"].forEach(a=>us.innerHTML+=`<option value="${d}${a}">${d}${a}</option>`);
  }else if(sec==="mishnah"){
    ul.textContent=t("perek")+" · "+t("mishna");
    let m;for(const s of Object.values(MISHNAH))for(const mx of s.masechtot)if(mx.id===bkId)m=mx;
    if(m)m.perakim.forEach((cnt,pi)=>{for(let mi=1;mi<=cnt;mi++)us.innerHTML+=`<option value="p${pi+1}m${mi}">${t("perek")} ${pi+1} · ${t("mishna")} ${mi}</option>`;});
  }else if(sec==="tanach"){
    ul.textContent=t("perek");
    let b;for(const s of Object.values(TANACH))for(const bk of s.books)if(bk.id===bkId)b=bk;
    if(b)for(let p=1;p<=b.perakim;p++)us.innerHTML+=`<option value="p${p}">${t("perek")} ${p}</option>`;
  }else if(sec==="shulchan"){
    ul.textContent=t("siman");
    const ch=SHULCHAN.find(c=>c.id===bkId);
    if(ch)for(let s=1;s<=ch.simanim;s++)us.innerHTML+=`<option value="s${s}">${t("siman")} ${s}</option>`;
  }
}
function hlType(){
  const val=document.querySelector("input[name='lf-tp']:checked")?.value;
  STUDY_TYPES.forEach(tp=>{
    const el=document.getElementById("lto-"+tp.id);if(!el)return;
    const on=tp.id===val;
    el.style.borderColor=on?`hsl(${tp.h},70%,65%)`:"var(--border2)";
    el.style.background=on?`hsla(${tp.h},70%,60%,.15)`:"var(--surface2)";
    el.style.color=on?`hsl(${tp.h},80%,70%)`:"var(--muted)";
  });
}
function saveManualLog(){
  const date=document.getElementById("lf-date").value;
  const sec=document.getElementById("lf-sec").value;
  const bkId=document.getElementById("lf-book").value;
  const unitId=document.getElementById("lf-unit").value;
  const type=document.querySelector("input[name='lf-tp']:checked")?.value||"study";
  const notes=document.getElementById("lf-notes").value.trim();
  let bookName="",unitLabel="";
  if(sec==="gemara"){for(const s of Object.values(SHAS))for(const m of s.masechtot)if(m.id===bkId){bookName=L(m);break;}unitLabel=t("daf")+" "+unitId;}
  else if(sec==="mishnah"){for(const s of Object.values(MISHNAH))for(const m of s.masechtot)if(m.id===bkId){bookName=L(m);break;}unitLabel=unitId.replace("p",t("perek")+" ").replace("m"," "+t("mishna")+" ");}
  else if(sec==="tanach"){for(const s of Object.values(TANACH))for(const b of s.books)if(b.id===bkId){bookName=L(b);break;}unitLabel=t("perek")+" "+unitId.replace("p","");}
  else if(sec==="shulchan"){const ch=SHULCHAN.find(c=>c.id===bkId);if(ch)bookName=L(ch);unitLabel=t("siman")+" "+unitId.replace("s","");}
  setP(sec,bkId,unitId,type);
  logs=[{id:uid(),date,section:sec,bookId:bkId,bookName,unitLabel,type,notes,ts:new Date().toISOString()},...logs.slice(0,999)];
  save();closeModal();
  if(currentTab==="logs")renderLogs();
  renderHome();
  toast("✅ "+t("save")+"!");
}

function openGoalModal(){
  const secOpts=Object.entries(SECTIONS_META).map(([k,sm])=>`<option value="${k}">${sm.emoji} ${L(sm)}</option>`).join("");
  openModal(`
    <h3>🎯 ${lang==="he"?"יעד חדש":"Nueva meta"}</h3>
    <div class="field"><label class="lbl">${t("goalDesc")}</label><input class="inp" id="gf-desc" placeholder="${lang==="he"?"למשל: לסיים ברכות":"Ej: Terminar Berajot"}"/></div>
    <div class="field"><label class="lbl">${t("section")}</label><select class="sel" id="gf-sec">${secOpts}</select></div>
    <div class="field"><label class="lbl">${t("targetUnit")}</label><input class="inp" id="gf-target" placeholder="${lang==="he"?"64 דפים, 150 פרקים…":"64 dafim, 150 cap…"}"/></div>
    <div class="field"><label class="lbl">${t("deadline")}</label><input class="inp" type="date" id="gf-deadline"/></div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-surface" onclick="closeModal()">${t("cancel")}</button>
      <button class="btn btn-purple" onclick="saveGoal()">${t("save")}</button>
    </div>`);
}
function saveGoal(){
  const desc=document.getElementById("gf-desc").value.trim();
  const section=document.getElementById("gf-sec").value;
  const target=document.getElementById("gf-target").value.trim();
  const deadline=document.getElementById("gf-deadline").value;
  if(!desc||!deadline){toast(lang==="he"?"מלא את כל השדות":"Completa los campos",false);return;}
  goals=[{id:uid(),desc,section,target,deadline,progress:0,done:false,created:today()},...goals];
  save();closeModal();if(currentTab==="goals")renderGoals();renderHome();
  toast("🎯 "+(lang==="he"?"נשמר!":"¡Guardado!"));
}

function openChazModal(){
  const secOpts=Object.entries(SECTIONS_META).map(([k,sm])=>`<option value="${k}">${sm.emoji} ${L(sm)}</option>`).join("");
  openModal(`
    <h3>🧠 ${lang==="he"?"יעד חזרה חדש":"Nueva Jazará"}</h3>
    <div class="field"><label class="lbl">${t("chazDesc")}</label><input class="inp" id="cf-desc" placeholder="${lang==="he"?"שם החזרה":"Nombre…"}"/></div>
    <div class="field"><label class="lbl">${t("section")}</label><select class="sel" id="cf-sec">${secOpts}</select></div>
    <div class="field"><label class="lbl">${t("material")}</label><input class="inp" id="cf-mat" placeholder="${lang==="he"?"מסכת ברכות, פרקים א-ג…":"Masechet Berajot, Caps. 1-3…"}"/></div>
    <div class="field"><label class="lbl">${t("frequency")}</label>
      <div class="iv-grid">
        ${CHAZ_INTERVALS.map((iv,i)=>`<label class="iv-opt" id="civ-${iv.id}" style="${i===2?"border-color:var(--blue);background:rgba(124,110,255,.15);color:var(--blue2)":""}">
          <input type="radio" name="cf-iv" value="${iv.id}" ${i===2?"checked":""} onchange="onIvChg()"/>
          <div style="font-size:16px;margin-bottom:2px">${iv.icon}</div>${t(iv.id)}</label>`).join("")}
      </div>
      <div id="custom-w" style="display:none;margin-top:10px">
        <label class="lbl">${t("customDays")}</label>
        <input class="inp" type="number" id="cf-custom" value="14" min="1" max="365"/>
      </div>
    </div>
    <div class="field"><label class="lbl">${t("startDate")}</label><input class="inp" type="date" id="cf-start" value="${today()}"/></div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-surface" onclick="closeModal()">${t("cancel")}</button>
      <button class="btn btn-purple" onclick="saveChaz()">${t("save")}</button>
    </div>`);
}
function onIvChg(){
  const val=document.querySelector("input[name='cf-iv']:checked")?.value;
  CHAZ_INTERVALS.forEach(iv=>{
    const el=document.getElementById("civ-"+iv.id);if(!el)return;
    const on=iv.id===val;
    el.style.borderColor=on?"var(--blue)":"var(--border2)";
    el.style.background=on?"rgba(124,110,255,.15)":"var(--surface2)";
    el.style.color=on?"var(--blue2)":"var(--muted)";
  });
  document.getElementById("custom-w").style.display=val==="custom"?"block":"none";
}
function saveChaz(){
  const desc=document.getElementById("cf-desc").value.trim();
  const section=document.getElementById("cf-sec").value;
  const material=document.getElementById("cf-mat").value.trim();
  const interval=document.querySelector("input[name='cf-iv']:checked")?.value||"weekly";
  const customD=+document.getElementById("cf-custom")?.value||14;
  const start=document.getElementById("cf-start").value;
  if(!material){toast(lang==="he"?"מלא את השדות":"Completa los campos",false);return;}
  const iv=CHAZ_INTERVALS.find(i=>i.id===interval);
  const days=interval==="custom"?customD:iv.days;
  chazGoals=[{id:uid(),desc,section,material,interval,days,nextDate:addDays(start,days),streak:0,history:[],done:false},...chazGoals];
  save();closeModal();if(currentTab==="chaz")renderChaz();renderHome();
  toast("🧠 "+(lang==="he"?"נשמרה!":"¡Guardada!"));
}

/* ═══ NAVIGATION ══════════════════════════════════════════════════ */
const RENDERS={home:renderHome,study:renderStudy,goals:renderGoals,chaz:renderChaz,logs:renderLogs};
function setTab(tab){
  currentTab=tab;
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById("view-"+tab).style.display="block";
  document.querySelectorAll(".nb").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  document.getElementById("fab").style.display=["home","logs","study"].includes(tab)?"flex":"none";
  if(RENDERS[tab])RENDERS[tab]();
}
document.querySelectorAll(".nb").forEach(b=>b.addEventListener("click",()=>setTab(b.dataset.tab)));
document.getElementById("fab").addEventListener("click",()=>openLogModal());

/* ═══ PWA ═════════════════════════════════════════════════════════ */
window._deferredInstall=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();window._deferredInstall=e;if(currentTab==="home")renderHome();});
function installPWA(){if(!window._deferredInstall)return;window._deferredInstall.prompt();window._deferredInstall.userChoice.then(()=>{window._deferredInstall=null;renderHome();});}

/* ═══ INIT ════════════════════════════════════════════════════════ */
if(lang==="he"){document.documentElement.lang="he";document.documentElement.dir="rtl";document.getElementById("lang-btn").textContent="🌐 Español";}
if("serviceWorker" in navigator)navigator.serviceWorker.register("sw.js");
setTab("home");
</script>
